<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>

    <!-- tailwind + daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- tailwind + daisyui -->

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- font awesome -->

    <!-- geist font from google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!-- geist font from google fonts -->

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <section id="login" class="login flex justify-center items-center min-h-screen bg-[#F8FAFC]">
        <!-- login form -->
        <div class="bg-white my-[60px] p-[32px] gap-[24px] rounded-md">
            <div class="grid place-items-center space-y-3 p-5">
                <img src="./assets/github-logo.png" alt="">
                <h2 class="font-semibold text-xl mt-4">GitHub Issues Tracker</h2>
                <p class="text-[#64748B]">Sign in to manage your issues</p>
            </div>
            <fieldset class="fieldset bg-white rounded-box w-xs">

                <label class="text-[#1F2937] font-medium text-base">Username</label>
                <input id="admin" type="email" class="input" placeholder="Enter Username" />
                <small class="hint font-medium font-regular text-[#4A00FF]">Default: admin</small>

                <label class="text-[#1F2937] font-medium text-base">Password</label>
                <input id="password" type="password" class="input" placeholder="Enter Password" />
                <small class="hint font-medium text-[#4A00FF]">Default: admin123</small>


                <button id="login-btn" class="btn btn-primary mt-4">Login</button>
            </fieldset>
            <div class="grid place-items-center space-y-3 p-5">
                <!-- or div -->
                <div class="w-full py-4">
                    <div class="flex items-center w-full">
                        <div class="flex-grow border-t border-gray-300"></div>
                        <span class="px-3 text-gray-400 text-sm font-medium">OR</span>
                        <div class="flex-grow border-t border-gray-300"></div>
                    </div>
                </div>
                <!-- or div -->

                <!-- footer> -->
                <div>
                    <p class="text-[#64748B] font-normal mb-2 text-center">Demo Credentials:</p>

                    <div class="bg-gray-100 w-full px-18 py-5 rounded-md">
                        <div>
                            <h2 class="text-[#1F2937] font-semibold text-base">
                                Username: <span class="font-normal">admin</span>
                            </h2>
                        </div>

                        <div>
                            <h2 class="text-[#1F2937] font-semibold text-base">
                                Password: <span class="font-normal">admin123</span>
                            </h2>
                        </div>
                    </div>
                </div>
                <!-- footer> -->
            </div>
        </div>
        <!-- login form -->
    </section>
    <main id="main" class="hidden bg-[#F8FAFC] min-h-screen mx-0 md:mx-10 lg:mx-[120px] xl:mx-[245px]">
        <!-- navbar -->
        <div class="navbar bg-base-100 shadow-sm px-4 md:px-10 flex-col lg:flex-row gap-4 py-4 md:py-2 sticky top-0">
            <div class="flex-1">
                <div class="flex">
                    <img class="h-[37px] w-[36px]" src="./assets/github-logo.png" alt="">
                    <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
                </div>
            </div>
            <div class="flex gap-2">
                <!-- <input type="text" placeholder='' class="input input-bordered w-24 md:w-auto" /> -->
                <!-- search -->
                <div class="flex items-center w-full max-w-sm px-3 py-1.5 bg-white border border-gray-300 rounded-md transition-all focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-100 group"
                    <i
                    class="fa-solid fa-magnifying-glass text-gray-400 text-sm mr-2 transition-colors group-focus-within:text-blue-500">
                    </i>

                    <input id="input-search" type="text" placeholder="Search issues..."
                        class="w-full text-sm text-gray-700 bg-transparent border-none outline-none placeholder:text-gray-400 focus:ring-0" />

                </div>
                <!-- search -->
                <button id="search-btn" class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>
        <!-- navbar -->
        <!-- three button  -->
        <section class="p-6 bg-white rounded shadow-sm">
            <button onclick="selectIssues('all-btn')" id="all-btn" class="btn-three btn btn-primary">All</button>
            <button onclick="selectIssues('open')" id="open" class="btn-three btn btn-outline">Open</button>
            <button onclick="selectIssues('closed')" id="closed" class="btn-three btn btn-outline">Closed</button>
        </section>
        <!-- three button  -->

        <!-- card and total bar -->
        <div>
            <div
                class="flex flex-col md:flex-row justify-between items-start md:items-center bg-white mt-4 p-6 shadow-sm mb-4 gap-4">
                <!-- total bar -->
                <div class="flex gap-4 items-center">
                    <img class="h-[32px] w-[32px]" src="./assets/Aperture.png" alt="">
                    <div>
                        <h2 class="text-xl font-bold">50 Issues</h2>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex justify-end items-center gap-3">
                    <h3><i class="fa-solid fa-circle text-[#00A96E]"></i>Open</h3>
                    <h3><i class="fa-solid fa-circle text-[#A855F7]"></i>Closed</h3>
                </div>
            </div>
            <!-- total bar -->
            <!-- card -->
            <div id="card-container"
                class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 p-4 rounded gap-4">

                <!-- inner card -->

                <!-- <div class="bg-white p-4 space-y-4 border-t-4 border-green-800 rounded-md">
                    <div class="flex justify-between">
                        <img src="./assets/Open-Status.png" alt="">
                        <h3 class="bg-red-200 rounded text-red-600">HIGH</h3>
                    </div>
                    <h2 class="text-xl font-bold">Fix navigation menu on mobile devices</h2>
                    <p class="text-[#64748B] line-clamp-2">The navigation menu doesn't collapse properly on mobile
                        devices Lorem ipsum dolor sit amet consectetur adipisicing elit. Autem dolore pariatur labore!
                        Cumque dolorum aperiam explicabo molestiae illum quasi pariatur?
                    </p>
                    <div class="flex border-b border-gray-300 p-4">
                        <h2>BUG</h2>
                        <h2>HELP WANTED</h2>
                    </div>
                    <div class="mt-4">
                    <p class="text-[#64748B]">#1
                        by john_doe</p>
                    <p class="text-[#64748B]">1/15/2024</p>
                    </div>
                </div> -->
                <!-- inner card -->

            </div>
            <!-- card -->
             <div id="loadingSpinner" class="h-[60vh] flex hidden justify-center items-center">
                    <span class="loading loading-dots loading-xl"></span>
            </div>

        </div>
        <!-- card and total bar -->

        <!-- modal -->
        <dialog id="my_modal_3" class="modal">
            <div class="modal-box flex flex-col gap-4 p-8">

                <h3 id="modalTitle" class="text-2xl font-bold"></h3>

                <div class="flex items-center gap-2 mb-2">
                    <span id="modalStatus" class="badge badge-outline bg-green-600 rounded-lg"></span>
                    <p id="modalAuthor" class="text-sm text-gray-500 mb-4"></p>
                    <p id="modalDate" class="text-sm text-gray-500 mb-4"></p>

                </div>

                <div class="">
                    <h2 id="modalLabels"
                        class="text-sm text-yellow-600 bg-yellow-200 rounded-lg border border-yellow-600 w-30"></h2>
                </div>

                <p id="modalDescription" class="py-4 text-gray-700"></p>

                <div
                    class="bg-gray-100 flex flex-col sm:flex-row p-5 justify-between items-start sm:items-center gap-4">
                    <div>
                        <p class="text-md font-semibold text-[#64748B]">Assignee:</p>
                        <p id="assigneeName"></p>
                    </div>
                    <div>
                        <p class="text-md font-semibold text-[#64748B]">Priority:</p>
                        <p id="priority" class="badge"></p>
                    </div>

                </div>

                <div class="modal-action mt-2">
                    <form method="dialog">
                        <button class="btn btn-primary btn-sm">Close</button>
                    </form>
                </div>

            </div>
        </dialog>
        <!-- modal -->
    </main>
    <script src="./script/login.js"></script>
    <script src="./script/main.js"></script>
</body>

</html>
