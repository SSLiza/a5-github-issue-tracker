<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>

    <!-- tailwind + daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- tailwind + daisyui -->

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- font awesome -->

    <!-- geist font from google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!-- geist font from google fonts -->

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <section id="login" class="login flex justify-center items-center min-h-screen bg-[#F8FAFC]">
        <!-- login form -->
        <div class="bg-white my-[60px] p-[32px] gap-[24px] rounded-md">
            <div class="grid place-items-center space-y-3 p-5">
                <img src="./assets/github-logo.png" alt="">
                <h2 class="font-semibold text-xl mt-4">GitHub Issues Tracker</h2>
                <p class="text-[#64748B]">Sign in to manage your issues</p>
            </div>
            <fieldset class="fieldset bg-white rounded-box w-xs">

                <label class="text-[#1F2937] font-medium text-base">Username</label>
                <input id="admin" type="email" class="input" placeholder="Enter Username" />
                <small class="hint font-medium font-regular text-[#4A00FF]">Default: admin</small>

                <label class="text-[#1F2937] font-medium text-base">Password</label>
                <input id="password" type="password" class="input" placeholder="Enter Password" />
                <small class="hint font-medium text-[#4A00FF]">Default: admin123</small>


                <button id="login-btn" class="btn btn-primary mt-4">Login</button>
            </fieldset>
            <div class="grid place-items-center space-y-3 p-5">
                <!-- or div -->
                <div class="w-full py-4">
                    <div class="flex items-center w-full">
                        <div class="flex-grow border-t border-gray-300"></div>
                        <span class="px-3 text-gray-400 text-sm font-medium">OR</span>
                        <div class="flex-grow border-t border-gray-300"></div>
                    </div>
                </div>
                <!-- or div -->

                <!-- footer> -->
                <div>
                    <p class="text-[#64748B] font-normal mb-2 text-center">Demo Credentials:</p>

                    <div class="bg-gray-100 w-full px-18 py-5 rounded-md">
                        <div>
                            <h2 class="text-[#1F2937] font-semibold text-base">
                                Username: <span class="font-normal">admin</span>
                            </h2>
                        </div>

                        <div>
                            <h2 class="text-[#1F2937] font-semibold text-base">
                                Password: <span class="font-normal">admin123</span>
                            </h2>
                        </div>
                    </div>
                </div>
                <!-- footer> -->
            </div>
        </div>
        <!-- login form -->
    </section>
    <main id="main" class="bg-[#F8FAFC] min-h-screen hidden">
        <!-- navbar -->
        <div class="navbar bg-base-100 shadow-sm px-15">
            <div class="flex-1">
                <div class="flex h-[37px] w-[36px]">
                    <img src="./assets/github-logo.png" alt="">
                    <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
                </div>
            </div>
            <div class="flex gap-2">
                <!-- <input type="text" placeholder='' class="input input-bordered w-24 md:w-auto" /> -->
                <!-- search -->
                <div
                    class="flex items-center w-full max-w-sm px-3 py-1.5 bg-white border border-gray-300 rounded-md transition-all focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-100 group">

                    <i
                        class="fa-solid fa-magnifying-glass text-gray-400 text-sm mr-2 transition-colors group-focus-within:text-blue-500"></i>

                    <input type="text" placeholder="Search issues..."
                        class="w-full text-sm text-gray-700 bg-transparent border-none outline-none placeholder:text-gray-400 focus:ring-0" />

                </div>
                <!-- search -->
                <button class="btn btn-primary"> <i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>
        <!-- navbar -->
        <!-- three button  -->
        <section class="p-6 mx-[245px] bg-white rounded">
            <button class="btn btn-primary">All</button>
            <button class="btn btn-primary">Open</button>
            <button class="btn btn-primary">Closed</button>
        </section>
        <!-- three button  -->

        <!-- card and total bar -->

        <!-- card and total bar -->
    </main>
    <script src="./script/login.js"></script>
</body>

</html>
